<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles(1).css" />
    <title>BusKonnect</title>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <h1>BusKonnect</h1>
        <img src="images/logo.png" alt="" id="logo" />
      </div>
      <div class="profile">
        <img src="images/user.png" alt="" id="profile" />
      </div>
    </div>

    <hr />

    <div class="content">
      <div class="route-location">
        <div class="origin">
          <p>Samrand</p>
          <img src="images/refresh.png" alt="" class="" id="change-origin" />
        </div>
        <div class="destination">
          <p>Centurion</p>
          <img
            src="images/refresh.png"
            alt=""
            class=""
            id="change-destination"
          />
        </div>
        <p class="view-route">View Route</p>
        <div class="next-stop">
          <p>Next Stop:</p>
          <p id="time">07:00</p>
        </div>
      </div>
      <div class="departure-time">
        <h3>
          Departure from
          <p id="location">Centurion Station</p>
        </h3>
        <hr />
        <div class="departure-times">
          <p>07:00</p>
          <p>07:30</p>
          <p>08:00</p>
        </div>
      </div>
    </div>

    <div class="nav">
      <div class="home">
        <img src="images/home.png" alt="" inputmode="home" />
      </div>
      <div class="menu">
        <img src="images/menu.png" alt="" id="menu" />
      </div>
      <div class="map">
        <img src="images/map.png" alt="" id="map" />
      </div>
      <div class="profile">
        <img src="images/profile.png" alt="" id="profile" />
      </div>
    </div>
  </body>
</html>
